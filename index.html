<body>
    <div class="container">
        <header>
            <h1>🛠️ JSON 工具箱</h1>
            <p class="subtitle">免费在线 JSON 格式化、验证和转换工具</p>
        </header>

        <div class="main-content">
            <div class="toolbar">
                <button class="btn-primary" onclick="formatJSON()">✨ 格式化</button>
                <button class="btn-success" onclick="minifyJSON()">📦 压缩</button>
                <button class="btn-secondary" onclick="validateJSON()">✅ 验证</button>
                <button class="btn-secondary" onclick="convertToXML()">📄 转XML</button>
                <button class="btn-secondary" onclick="convertToYAML()">📝 转YAML</button>
                <button class="btn-danger" onclick="clearAll()">🗑️ 清空</button>
                <button class="btn-primary" onclick="copyOutput()">📋 复制结果</button>
            </div>

            <div class="editor-container">
                <div class="editor-panel">
                    <div class="editor-title">输入 JSON</div>
                    <div class="editor-wrapper">
                        <textarea id="inputJSON" placeholder='{"name": "JSON工具箱", "version": "1.0", "features": ["格式化", "验证", "转换"]}'></textarea>
                    </div>
                </div>

                <div class="editor-panel">
                    <div class="editor-title">输出结果</div>
                    <div class="editor-wrapper">
                        <textarea id="outputJSON" readonly placeholder="处理后的 JSON 将显示在这里..."></textarea>
                    </div>
                </div>
            </div>

            <div id="statusBar" class="status-bar status-info">
                准备就绪，请输入 JSON 数据
            </div>

            <div class="stats">
                <span id="charCount">字符数: 0</span>
                <span id="lineCount">行数: 0</span>
                <span id="jsonSize">大小: 0 bytes</span>
            </div>

                    <div class="feature-title">格式化美化</div>
                    <div class="feature-desc">一键将压缩的 JSON 格式化为易读的缩进格式</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">📦</div>
                    <div class="feature-title">压缩优化</div>
                    <div class="feature-desc">去除空格和换行，最小化 JSON 文件大小</div>

    <script>
        function getInput() {
            return document.getElementById('inputJSON').value;
        }

        function setOutput(value) {
            document.getElementById('outputJSON').value = value;
        }

        function showStatus(message, type = 'info') {
            const statusBar = document.getElementById('statusBar');
            statusBar.textContent = message;
            statusBar.className = 'status-bar status-' + type;
        }

        function updateStats() {
            const input = getInput();
            const charCount = input.length;
            const lineCount = input.split('\n').length;
            const size = new Blob([input]).size;

            document.getElementById('charCount').textContent = `字符数: ${charCount}`;
            document.getElementById('lineCount').textContent = `行数: ${lineCount}`;
            document.getElementById('jsonSize').textContent = `大小: ${size} bytes`;
        }

        function parseJSON(input) {
            try {
                return JSON.parse(input);
            } catch (e) {
                throw new Error(`JSON 解析错误: ${e.message}`);
            }
        }

        function formatJSON() {
            const input = getInput();
            if (!input.trim()) {
                showStatus('请输入 JSON 数据', 'error');
                return;
            }

            try {
                const obj = parseJSON(input);
                const formatted = JSON.stringify(obj, null, 2);
                setOutput(formatted);
                showStatus('✅ 格式化成功！', 'success');
            } catch (e) {
                showStatus(e.message, 'error');
            }

            updateStats();
        }

        function minifyJSON() {
            const input = getInput();
            if (!input.trim()) {
                showStatus('请输入 JSON 数据', 'error');
                return;
            }

            try {
                const obj = parseJSON(input);
                const minified = JSON.stringify(obj);
                setOutput(minified);
                const saved = input.length - minified.length;
                showStatus(`✅ 压缩成功！节省 ${saved} 字节 (${((saved/input.length)*100).toFixed(1)}%)`, 'success');
            } catch (e) {
                showStatus(e.message, 'error');
            }

            updateStats();
        }

        function validateJSON() {
            const input = getInput();
            if (!input.trim()) {
                showStatus('请输入 JSON 数据', 'error');
                return;
            }

            try {
                parseJSON(input);
                const stats = {
                    valid: true,
                    type: typeof parseJSON(input),
                    keys: Object.keys(parseJSON(input)).length
                };
                showStatus(`✅ JSON 格式正确！包含 ${stats.keys} 个顶级键`, 'success');
            } catch (e) {
                showStatus(e.message, 'error');
            }

            updateStats();
        }

        function convertToXML() {
            const input = getInput();
            if (!input.trim()) {
                showStatus('请输入 JSON 数据', 'error');
                return;
            }

            try {
                const obj = parseJSON(input);
                const xml = jsonToXML(obj, 'root');
                setOutput(xml);
                showStatus('✅ 转换为 XML 成功！', 'success');
            } catch (e) {
                showStatus(e.message, 'error');
            }

            updateStats();
        }

        function jsonToXML(obj, rootName) {
            let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<${rootName}>`;

            function toXML(value, key) {
                if (typeof value === 'object' && value !== null) {
                    let str = '';
                    if (Array.isArray(value)) {
                        value.forEach(item => {
                            str += `<${key}>${toXML(item, 'item')}</${key}>`;
                        });
                    } else {
                        for (let k in value) {
                            str += `<${k}>${toXML(value[k], k)}</${k}>`;
                        }
                    }
                    return str;
                }
                return String(value);
            }

            xml += toXML(obj, 'root');
            xml += `</${rootName}>`;
            return xml;
        }

        function convertToYAML() {
            const input = getInput();
            if (!input.trim()) {
                showStatus('请输入 JSON 数据', 'error');
                return;
            }

            try {
                const obj = parseJSON(input);
                const yaml = jsonToYAML(obj);
                setOutput(yaml);
                showStatus('✅ 转换为 YAML 成功！', 'success');
            } catch (e) {
                showStatus(e.message, 'error');
            }

            updateStats();
        }

        function jsonToYAML(obj, indent = 0) {
            const spaces = '  '.repeat(indent);

            if (typeof obj !== 'object' || obj === null) {
                return String(obj);
            }

            if (Array.isArray(obj)) {
                if (obj.length === 0) return '[]';
                return obj.map(item => '- ' + jsonToYAML(item, indent).replace(/^/gm, spaces)).join('\n');
            }

            let result = '';
            for (let key in obj) {
                const value = obj[key];
                if (typeof value === 'object' && value !== null && !Array.isArray(value)) {
                    result += `${spaces}${key}:\n${jsonToYAML(value, indent + 1)}`;
                } else if (Array.isArray(value)) {
                    if (value.length === 0) {
                        result += `${spaces}${key}: []\n`;
                    } else {
                        result += `${spaces}${key}:\n${jsonToYAML(value, indent + 1)}`;
                    }
                } else {
                    const str = String(value);
                    if (typeof value === 'string') {
                        result += `${spaces}${key}: "${str}"\n`;
                    } else {
                        result += `${spaces}${key}: ${str}\n`;
                    }
                }
            }
            return result;
        }

        function clearAll() {
            document.getElementById('inputJSON').value = '';
            document.getElementById('outputJSON').value = '';
            showStatus('已清空所有内容', 'info');
            updateStats();
        }

        function copyOutput() {
            const output = document.getElementById('outputJSON').value;
            if (!output) {
                showStatus('没有可复制的内容', 'error');
                return;
            }

            navigator.clipboard.writeText(output).then(() => {
                showStatus('✅ 已复制到剪贴板！', 'success');
            }).catch(() => {
                showStatus('❌ 复制失败', 'error');
            });
        }

        // 实时更新统计
        document.getElementById('inputJSON').addEventListener('input', updateStats);

        // 页面加载时初始化
        updateStats();
    </script>
